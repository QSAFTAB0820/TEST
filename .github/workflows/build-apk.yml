name: Build Flutter APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    # This line tells GitHub all commands happen inside the flutter_app folder
    defaults:
      run:
        working-directory: flutter_app 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          sparse-checkout: . # This ensures it pulls the whole repo structure

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          # We point to the specific path inside the subfolder
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk