name: Build Flutter APK
on:
  push:
    branches: [ main ] # Runs every time you push code to the 'main' branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # This automatically downloads the latest stable Flutter SDK in the cloud

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug 
        # We use --debug for easy testing. Use --release for production.

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/app-debug.apk